<div class="form-group">
    <label for="url" class="form-label">URL:</label>
    <input type="text" id="url" name="url" placeholder="https://example.com" required class="form-input">
</div>

<div class="settings-callout warning">
    {{ icon('info', 'icon-image') | safe }}
    <span>Only use trusted URLs. Slow or heavily scripted sites may fail to render before the screenshot timeout.</span>
</div>

<script>
    // populate form values from plugin settings
    document.addEventListener('DOMContentLoaded', () => {        
        if (loadPluginSettings) {
            document.getElementById('url').value = pluginSettings.url;
        }
    });
</script>
