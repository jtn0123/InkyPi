<div class="settings-card">
    <div class="settings-card-title">List Settings</div>
    <div class="options-grid">
        <div class="form-group">
            <label for="title" class="form-label">Title</label>
            <input type="text" id="title" name="title" placeholder="Tasks" class="form-input">
        </div>
        <div class="form-group">
            <label for="listStyle" class="form-label">List Style</label>
            <select id="listStyle" name="listStyle" class="form-input">
                <option value="disc">Disc (●)</option>
                <option value="square">Square (◼)</option>
                <option value="'\25C6  '">Diamond (◆)</option>
                <option value="decimal">Decimal</option>
                <option value="lower-roman">Roman Numeral</option>
                <option value="lower-alpha">Alphabetical</option>
            </select>
        </div>
        <div class="form-group">
            <label for="fontSize" class="form-label">Font Size</label>
            <select id="fontSize" name="fontSize" class="form-input">
                <option value="x-small">Extra Small</option>
                <option value="small">Small</option>
                <option value="normal">Normal</option>
                <option value="large">Large</option>
                <option value="x-large">Extra Larger</option>
            </select>
        </div>
    </div>
    <span class="field-note">Add up to three task lists. Each list can have its own title and body text.</span>
</div>

<div class="settings-card">
    <div class="settings-card-title">Lists</div>
    <div class="dynamic-list" id="listsContainer"></div>
    <button class="action-button compact is-secondary" type="button" id="addBtn">Add List</button>
</div>

<script>
    const container = document.getElementById("listsContainer");
    const addBtn = document.getElementById("addBtn");
    let listCount = 0;
    const maxLists = 3;

    function createList(title = "", text = "") {
        if (listCount >= maxLists) return;

        listCount++;
        const list = document.createElement("div");
        list.className = "dynamic-list-item";

        list.innerHTML = `
        <div class="dynamic-list-toolbar">
            <input id="list-title[]" name="list-title[]" type="text" placeholder="List title" value="${title}" class="form-input">
            <button type="button" class="remove-btn" title="Delete List" aria-label="Delete list">
                {{ icon('trash', 'action-icon') | safe }}
            </button>
        </div>
        <textarea id="list[]" name="list[]" placeholder="Enter your tasks..." class="form-input" rows="6">${text}</textarea>
        `;

        list.querySelector(".remove-btn").onclick = () => {
            list.remove();
            listCount--;
        };

        container.appendChild(list);
    }

    document.addEventListener('DOMContentLoaded', () => {
        let fontSize = "normal";
        let listStyle = "disc";

        if (loadPluginSettings) {
            document.getElementById('title').value = pluginSettings.title || '';
            const titles = pluginSettings['list-title[]'] || [];
            const texts = pluginSettings['list[]'] || [];

            for (let i = 0; i < Math.min(titles.length, maxLists); i++) {
                createList(titles[i], texts[i] || '');
            }

            fontSize = pluginSettings.fontSize;
            listStyle = pluginSettings.listStyle;
        }

        if (listCount === 0) createList();

        addBtn.onclick = () => {
            if (listCount < maxLists) createList();
        };

        document.getElementById('fontSize').value = fontSize;
        document.getElementById('listStyle').value = listStyle;
    });
</script>
