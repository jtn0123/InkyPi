<div class="form-group">
    <label for="url" class="form-label">Image URL:</label>
    <input type="text" id="url" name="url" placeholder="https://example.com/image.jpg" required class="form-input">
</div>

<div class="settings-callout warning">
    {{ icon('info', 'icon-image') | safe }}
    <span>Use trusted image URLs only. Remote images can fail if the source is slow, blocked, or returns unsupported formats.</span>
</div>

<script>
    // populate form values from plugin settings
    document.addEventListener('DOMContentLoaded', () => {        
        if (loadPluginSettings) {
            document.getElementById('url').value = pluginSettings.url;
        }
    });
</script>
