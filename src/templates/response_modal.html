{% from 'macros/icons.html' import icon %}
<!-- Reusable Success/Failure Notification Modal -->
<!-- aria-live="assertive" announces modal text to screen readers immediately (JTN-507) -->
<div id="responseModal" class="response-modal success-failure-modal" role="alertdialog" aria-modal="true" aria-labelledby="responseModalTitle" aria-describedby="modalMessage" aria-live="assertive" hidden>
    <div id="modalContent" class="response-modal-content">
        <h2 id="responseModalTitle" class="sr-only">Notification</h2>
        <button type="button" class="close-button" id="responseModalClose" aria-label="Close">{{ icon('x', 'close-icon') | safe }}</button>
        <p id="modalMessage"></p>
    </div>
</div>
