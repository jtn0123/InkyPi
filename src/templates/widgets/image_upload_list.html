<label for="imageUpload" class="form-input file-upload-label">Choose Images</label>
<input
    type="file"
    clear-on-submit
    id="imageUpload"
    name="imageFiles[]"
    accept="image/*"
    multiple
    class="file-upload-input"
>
<div id="fileNames" class="file-name-list"></div>
<div id="hiddenFileInputs"></div>
