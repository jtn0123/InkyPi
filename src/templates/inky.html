<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.name }}</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='styles/main.css') }}">
    <script>
        (function() {
            const theme = localStorage.getItem('inkypi-theme') || 
                         (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
        let lastModified = null;
        const refreshIntervalMs = 3 * 1000;

        async function refreshImage() {
            const img = document.querySelector('.image-container img');
            if (!img) return;

            try {
                const headers = {};
                if (lastModified) {
                    headers['If-Modified-Since'] = lastModified;
                }

                const response = await fetch('{{ url_for("main.get_current_image") }}', { headers });
                
                if (response.status === 304) {
                    return;
                }

                if (!response.ok) {
                    console.error('Failed to fetch image:', response.status);
                    return;
                }

                const blob = await response.blob();
                const objectUrl = URL.createObjectURL(blob);
                
                img.src = objectUrl;
                lastModified = response.headers.get('Last-Modified');
            } catch (error) {
                console.error('Error refreshing image:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            refreshImage();
            setInterval(refreshImage, refreshIntervalMs);
        });
    </script>
    <script src="{{ url_for('static', filename='scripts/image_modal.js') }}"></script>
</head>
<body>
    <!-- Skip navigation for accessibility -->
    <a href="#main-content" class="skip-nav">Skip to main content</a>

    <!-- Subtle frame container -->
    <div class="frame">
        <!-- Page Title -->
        <header class="header">
            <h1>{{ config.name }}</h1>
            <button class="settings-button dark-mode-toggle" title="Toggle Dark Mode" aria-label="Toggle Dark Mode"></button>
            <a href="{{ url_for('apikeys.apikeys_page') }}" class="settings-button" title="API Keys">
                <span style="font-size: 20px;">🔑</span>
            </a>
            <a href="{{ url_for('playlist.playlists') }}" class="settings-button">
                <img src="{{ url_for('static', filename='icons/playlist.png') }}" title="Playlists" alt="playlists icon" class="icon-image">
            </a>
            <a href="{{ url_for('settings.settings_page') }}" class="settings-button">
                <img src="{{ url_for('static', filename='icons/settings.png') }}" title="Settings" alt="settings icon" class="icon-image">
            </a>
        </header>

        <!-- Main content area -->
        <main id="main-content" role="main">
            <!-- Display the current image (auto-refreshing preview) -->
            {% set fit = (config.get('preview_size_mode') == 'fit') %}
            <div class="image-container {% if not fit %}native{% endif %}">
                <div id="previewSkeleton" class="img-skeleton" aria-hidden="true"></div>
                <img id="previewImage" src="{{ url_for('main.preview_image') }}" alt="Current display image for {{ config.name }}"
                     width="{{ config.resolution[0] }}" height="{{ config.resolution[1] }}"
                     {% if not fit %}style="width: {{ config.resolution[0] }}px; height: {{ config.resolution[1] }}px;"{% endif %}>
            </div>

        <!-- Optional metadata about the current plugin/image (e.g., WPOTD) -->
        <div id="imageMeta" class="image-meta" style="display:none; margin-top: 8px;">
            <div id="imageMetaContent"></div>
        </div>

        <!-- Separator -->
        <div class="separator"></div>

        <div class="plugins-header">
            <h2 class="plugins-title">Plugins</h2>
            <div class="plugins-controls">
                <button class="sort-toggle" id="sortToggle" title="Reorder plugins">Sort</button>
                <button class="view-toggle" id="viewToggle" title="Switch view">List</button>
            </div>
        </div>

        <div class="sort-hint" id="sortHint">Drag plugins to reorder. Click "Save" when done.</div>

        <div class="plugins-container" id="pluginsContainer">
            {% for plugin in plugins %}
            <a href="{{ url_for('plugin.plugin_page', plugin_id=plugin.id) }}"
               class="plugin-item"
               data-plugin-id="{{ plugin.id }}"
               title="{{ plugin.display_name }}"
               draggable="false">
                <img src="{{ url_for('plugin.image', plugin_id=plugin.id, filename='icon.png') }}"
                     alt="{{ plugin.display_name }}"
                     class="icon-image">
                <span class="plugin-name">{{ plugin.display_name }}</span>
            </a>
            {% endfor %}
        </div>

        <script>
            // View mode (grid/list)
            const viewToggle = document.getElementById('viewToggle');
            const pluginsContainer = document.getElementById('pluginsContainer');
            let currentView = localStorage.getItem('inkypi-plugins-view') || 'grid';

            function updateView() {
                if (currentView === 'list') {
                    pluginsContainer.classList.add('list-view');
                    viewToggle.textContent = 'Grid';
                } else {
                    pluginsContainer.classList.remove('list-view');
                    viewToggle.textContent = 'List';
                }
            }

            viewToggle.addEventListener('click', () => {
                currentView = currentView === 'grid' ? 'list' : 'grid';
                localStorage.setItem('inkypi-plugins-view', currentView);
                updateView();
            });

            updateView();

            // Sort mode
            const sortToggle = document.getElementById('sortToggle');
            const sortHint = document.getElementById('sortHint');
            let isSorting = false;
            let draggedItem = null;

            function enableSorting() {
                isSorting = true;
                sortToggle.classList.add('active');
                sortToggle.textContent = 'Save';
                sortHint.classList.add('visible');
                pluginsContainer.classList.add('sorting');

                document.querySelectorAll('.plugin-item').forEach(item => {
                    item.draggable = true;
                    item.addEventListener('dragstart', handleDragStart);
                    item.addEventListener('dragend', handleDragEnd);
                    item.addEventListener('dragover', handleDragOver);
                    item.addEventListener('dragleave', handleDragLeave);
                    item.addEventListener('drop', handleDrop);
                    item.addEventListener('click', preventClick);
                });
            }

            function disableSorting() {
                isSorting = false;
                sortToggle.classList.remove('active');
                sortToggle.textContent = 'Sort';
                sortHint.classList.remove('visible');
                pluginsContainer.classList.remove('sorting');

                document.querySelectorAll('.plugin-item').forEach(item => {
                    item.draggable = false;
                    item.removeEventListener('dragstart', handleDragStart);
                    item.removeEventListener('dragend', handleDragEnd);
                    item.removeEventListener('dragover', handleDragOver);
                    item.removeEventListener('dragleave', handleDragLeave);
                    item.removeEventListener('drop', handleDrop);
                    item.removeEventListener('click', preventClick);
                });

                // Save order
                savePluginOrder();
            }

            function preventClick(e) {
                if (isSorting) {
                    e.preventDefault();
                }
            }

            function handleDragStart(e) {
                draggedItem = this;
                this.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            }

            function handleDragEnd(e) {
                this.classList.remove('dragging');
                document.querySelectorAll('.plugin-item').forEach(item => {
                    item.classList.remove('drag-over');
                });
            }

            function handleDragOver(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                if (this !== draggedItem) {
                    this.classList.add('drag-over');
                }
            }

            function handleDragLeave(e) {
                this.classList.remove('drag-over');
            }

            function handleDrop(e) {
                e.preventDefault();
                this.classList.remove('drag-over');

                if (this !== draggedItem) {
                    const items = Array.from(pluginsContainer.children);
                    const draggedIndex = items.indexOf(draggedItem);
                    const targetIndex = items.indexOf(this);

                    if (draggedIndex < targetIndex) {
                        this.parentNode.insertBefore(draggedItem, this.nextSibling);
                    } else {
                        this.parentNode.insertBefore(draggedItem, this);
                    }
                }
            }

            async function savePluginOrder() {
                const order = Array.from(pluginsContainer.children).map(item => item.dataset.pluginId);
                try {
                    const response = await fetch('{{ url_for("main.save_plugin_order") }}', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ order: order })
                    });
                    if (!response.ok) {
                        console.error('Failed to save plugin order');
                    }
                } catch (error) {
                    console.error('Error saving plugin order:', error);
                }
            }

            sortToggle.addEventListener('click', () => {
                if (isSorting) {
                    disableSorting();
                } else {
                    enableSorting();
                }
            });
        </script>
    </div>
<script>
    // Periodically refresh the preview image by cache-busting the URL
    const previewImg = document.getElementById('previewImage');
    const previewSkel = document.getElementById('previewSkeleton');
    if (previewImg) {
        previewImg.addEventListener('load', function(){ if (previewSkel) previewSkel.style.display = 'none'; });
        previewImg.addEventListener('error', function(){ if (previewSkel) previewSkel.style.display = 'none'; });
    }
    // Track latest image hash so we can avoid reloading when unchanged
    let lastImageHash = {{ refresh_info.get('image_hash')|tojson }};

    async function refreshPreview(){
        const base = '{{ url_for('main.preview_image') }}';
        let info = null;
        let up = null;
        // Fetch refresh_info and next_up concurrently
        try {
            [info, up] = await Promise.all([
                fetch('{{ url_for('main.refresh_info') }}').then(r => r.json()).catch(() => null),
                fetch('{{ url_for('main.next_up') }}').then(r => r.json()).catch(() => null)
            ]);
        } catch(e) {
            info = null;
            up = null;
        }

        if (info) {
            // Only reload image if the hash changed
            if (info.image_hash && info.image_hash !== lastImageHash) {
                lastImageHash = info.image_hash;
                if (previewSkel) previewSkel.style.display = '';
                previewImg.src = base + '?t=' + Date.now();
            }

            const metaDiv = document.getElementById('imageMeta');
            const metaContent = document.getElementById('imageMetaContent');
            if (info.plugin_meta) {
                const m = info.plugin_meta;
                const pid = info.plugin_id || '';
                const date = m.date ? new Date(m.date).toISOString().slice(0,10) : '';
                const title = m.title || '';
                const caption = m.caption || '';
                const expl = m.explanation || '';
                const link = m.page_url || m.description_url || '';
                let label = '';
                if (pid === 'wpotd') label = 'Wikipedia Picture of the Day:';
                else if (pid === 'apod') label = 'NASA APOD:';
                else if (pid === 'newspaper') label = 'Newspaper:';
                let html = '';
                if (date || label) html += `<div><strong>${label || pid}</strong> ${date}</div>`;
                if (title) html += `<div style="margin-top:4px;"><em>${title}</em></div>`;
                if (caption) html += `<div style="margin-top:4px;">${caption}</div>`;
                if (expl) html += `<div style=\"margin-top:4px;\">${expl}</div>`;
                if (link) html += `<div style=\"margin-top:4px;\"><a href=\"${link}\" target=\"_blank\" rel=\"noopener noreferrer\">Learn more</a></div>`;
                if (html) {
                    metaContent.innerHTML = html;
                    metaDiv.style.display = 'block';
                } else {
                    metaDiv.style.display = 'none';
                    metaContent.textContent = '';
                }
            } else {
                metaDiv.style.display = 'none';
                metaContent.textContent = '';
            }

            // Update Now showing block
            const ns = document.getElementById('nowShowing');
            const nsPlugin = document.getElementById('nsPlugin');
            const nsInst = document.getElementById('nsInstance');
            const nsPl = document.getElementById('nsPlaylist');
            if (ns && nsPlugin && nsInst && nsPl) {
                if (info.plugin_id) {
                    ns.style.display = 'block';
                    nsPlugin.textContent = info.plugin_id || '';
                    if (info.plugin_instance) {
                        nsInst.style.display = '';
                        nsInst.textContent = info.plugin_instance;
                    } else {
                        nsInst.style.display = 'none';
                        nsInst.textContent = '';
                    }
                    if (info.playlist) {
                        nsPl.style.display = '';
                        nsPl.textContent = info.playlist;
                    } else {
                        nsPl.style.display = 'none';
                        nsPl.textContent = '';
                    }
                } else {
                    ns.style.display = 'none';
                }
            }
        }

        if (up) {
            // Update Next up block
            const nu = document.getElementById('nextUp');
            const nuPlugin = document.getElementById('nuPlugin');
            const nuInst = document.getElementById('nuInstance');
            const nuPl = document.getElementById('nuPlaylist');
            if (nu && nuPlugin && nuInst && nuPl) {
                if (up.plugin_id) {
                    nu.style.display = 'block';
                    nuPlugin.textContent = up.plugin_id || '';
                    if (up.plugin_instance) {
                        nuInst.style.display = '';
                        nuInst.textContent = up.plugin_instance;
                    } else {
                        nuInst.style.display = 'none';
                        nuInst.textContent = '';
                    }
                    if (up.playlist) {
                        nuPl.style.display = '';
                        nuPl.textContent = up.playlist;
                    } else {
                        nuPl.style.display = 'none';
                        nuPl.textContent = '';
                    }
                } else {
                    nu.style.display = 'none';
                }
            }
        }
    }

    async function displayNextNow(){
        const btn = document.getElementById('displayNextBtn');
        if (btn) btn.disabled = true;
        try{
            const resp = await fetch('{{ url_for('main.display_next') }}', {method:'POST'});
            const j = await resp.json();
            if (!resp.ok || !j.success){
                showResponseModal('failure', 'Failed to display next: ' + (j.error || 'Unknown error'));
            } else {
                // Refresh preview and info shortly after
                setTimeout(refreshPreview, 300);
            }
        } catch(e){ /* ignore */ }
        finally { if (btn) btn.disabled = false; }
    }
    // Enable shared lightbox: single-click opens; double-click toggles native size
    (function(){
        const container = previewImg && previewImg.parentElement;
        const nativeWidth = {{ config.resolution[0] }};
        const nativeHeight = {{ config.resolution[1] }};
        if (previewImg){
            previewImg.style.cursor = 'zoom-in';
            previewImg.addEventListener('click', function(){ if (previewImg.src && window.Lightbox) window.Lightbox.open(previewImg.src, previewImg.alt); });
            if (container){
                previewImg.addEventListener('dblclick', function(e){
                    e.preventDefault();
                    if (container.classList.contains('native')) {
                        container.classList.remove('native');
                        previewImg.removeAttribute('style');
                    } else {
                        container.classList.add('native');
                        previewImg.style.width = nativeWidth + 'px';
                        previewImg.style.height = nativeHeight + 'px';
                    }
                });
            }
        }
    })();

    // Refresh every 5 seconds; optionally use SSE/WebSocket when available
    function startPolling(){
        refreshPreview();
        return setInterval(refreshPreview, 5000);
    }
    (function(){
        const pushUrl = window.INKYPI_PUSH_URL;
        if (pushUrl && window.EventSource){
            try {
                const es = new EventSource(pushUrl);
                es.onmessage = () => refreshPreview();
                es.onerror = () => { es.close(); startPolling(); };
            } catch(e){
                startPolling();
            }
        } else {
            startPolling();
        }
    })();

    // Click to toggle between fit and native resolution
    (function(){
        const container = previewImg && previewImg.parentElement;
        if (!previewImg || !container) return;
        const nativeWidth = {{ config.resolution[0] }};
        const nativeHeight = {{ config.resolution[1] }};
        previewImg.addEventListener('click', function(){
            if (container.classList.contains('native')) {
                container.classList.remove('native');
                previewImg.removeAttribute('style');
            } else {
                container.classList.add('native');
                previewImg.style.width = nativeWidth + 'px';
                previewImg.style.height = nativeHeight + 'px';
            }
        });
    })();
</script>
</body>
</html>
