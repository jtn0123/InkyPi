<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}InkyPi{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%2334c6a6'/><text x='50' y='72' font-size='60' font-family='system-ui' font-weight='700' text-anchor='middle' fill='white'>I</text></svg>">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles/main.css') }}">
    <script src="{{ url_for('static', filename='scripts/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='scripts/csrf.js') }}"></script>
    <script src="{{ url_for('static', filename='scripts/client_errors.js') }}"></script>
    <script src="{{ url_for('static', filename='scripts/form_validator.js') }}" defer></script>
    <script src="{{ url_for('static', filename='scripts/response_modal.js') }}" defer></script>
    {% block head %}{% endblock %}
    <script>
      if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1")) {
        window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
      }
    </script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    {% block body %}{% endblock %}
</body>
</html>
