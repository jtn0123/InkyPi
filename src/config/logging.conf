[loggers]
keys=root

[handlers]
keys=consoleHandler

[formatters]
keys=consoleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_standard]
level=INFO
qualname=standard

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=consoleFormatter
args=(sys.stdout,)

[formatter_consoleFormatter]
format=%(asctime)s - %(levelname)s - %(name)s - %(message)s
datefmt=%H:%M:%S

[formatter_fileFormatter]
format=%(asctime)-9s %(name)-8s: %(levelname)-10s - %(message)s
datefmt=%H:%M:%S

# Rotation parameters for the optional RotatingFileHandler attached by
# app_setup.logging_setup when INKYPI_LOG_FILE is set. This guards the Pi
# Zero 2 W's 16GB SD from runaway log growth (JTN-712).
# NOTE: This section is intentionally NOT listed in [handlers].keys above —
# fileConfig() does not instantiate it. logging_setup reads these values
# directly via configparser and attaches the handler at runtime.
[rotating_file]
class=logging.handlers.RotatingFileHandler
level=INFO
formatter=fileFormatter
maxBytes=1048576
backupCount=5
