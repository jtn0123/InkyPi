# Gitleaks configuration for InkyPi
# https://github.com/gitleaks/gitleaks#configuration

title = "InkyPi gitleaks config"

[extend]
# Extend the default ruleset
useDefault = true

# Allowlist false positives.
# - tests/test_log_redaction.py: intentional fake secrets that verify
#   the log-redaction filter; these are test fixtures, not credentials.
# - src/static/scripts/tweaks_panel.js: public client-side localStorage
#   key name ("inkypi_tweaks_v1") that happens to match the
#   generic-api-key entropy heuristic by accident.
[allowlist]
description = "False-positive strings that are not real credentials"
paths = [
    '''tests/test_log_redaction\.py''',
    '''src/static/scripts/tweaks_panel\.js''',
]
