name: Build release wheelhouse

# JTN-604: Build pre-compiled wheels for Pi Zero 2 W (armv7) and Pi 4/5 (arm64)
# and attach them as release assets. install.sh prefers the bundle when
# available, dropping first-boot install time on a Pi Zero 2 W from ~15 min
# down to ~2-3 min (no on-device wheel compilation for numpy/Pillow/cffi/etc).
#
# JTN-745 FIX: semantic-release publishes via GITHUB_TOKEN, so the standalone
# `release` trigger is not sufficient to guarantee wheelhouse assets are part
# of the main release contract. This workflow is now also reusable via
# `workflow_call`, and release.yml invokes it directly after publish so the
# parent Release workflow goes red if wheelhouse upload fails. We keep the
# release/manual triggers for maintainers who publish or rebuild outside that
# default path.

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to build wheels for (e.g. v0.28.1)
        required: true
        type: string
  release:
    types: [published]
  # Manual trigger so maintainers can rebuild wheels for an existing tag
  # without cutting a new release. JTN-745: manual rebuilds still attach to
  # the tagged release so historical gaps (for example v0.51.8 armv7l) can be
  # backfilled without bespoke local upload steps.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build wheels for (e.g. v0.28.1)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: build-wheelhouse-${{ github.event.release.tag_name || inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: linux_armv7l
            docker_platform: linux/arm/v7
          - arch: linux_aarch64
            docker_platform: linux/arm64
    steps:
      - name: Resolve tag
        id: tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG:-${INPUT_TAG:-}}"
          if [ -z "$TAG" ]; then
            echo "ERROR: No release tag resolved" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.docker_platform }}

      - name: Build wheels in Trixie container
        env:
          PLATFORM: ${{ matrix.docker_platform }}
          ARCH: ${{ matrix.arch }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/wheels

          # Trixie container matches the Pi OS 13 target; python3.13 is the
          # default interpreter. Mirrors the runtime the wheels will be
          # installed onto so wheel tags line up exactly with what pip sees
          # during install on-device.
          docker run --rm \
            --platform "$PLATFORM" \
            -v "$PWD:/src" \
            -w /src \
            debian:trixie-slim \
            bash -c '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                python3 python3-venv python3-pip python3-dev \
                build-essential pkg-config \
                libtiff-dev libopenjp2-7-dev libfreetype6-dev \
                libopenblas-dev libjpeg-dev zlib1g-dev \
                libffi-dev libssl-dev libxml2-dev libxslt1-dev \
                libsystemd-dev libheif-dev \
                libcairo2-dev libgirepository1.0-dev \
                swig ca-certificates
              python3 -m venv /tmp/buildvenv
              . /tmp/buildvenv/bin/activate
              python3 -m pip install --upgrade pip wheel build
              # Build wheels for every dep in the locked requirements file.
              # --no-deps is intentional: pip wheel already walks the
              # dependency graph from the requirements file, and we do not
              # want to pull in extras.
              python3 -m pip wheel \
                --wheel-dir=/src/dist/wheels \
                -r /src/install/requirements.txt
            '

          ls -la dist/wheels | head -40
          echo "Wheel count: $(find dist/wheels -name '*.whl' | wc -l)"

      - name: Package wheelhouse tarball
        id: package
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          TARBALL="inkypi-wheels-${VERSION}-${ARCH}.tar.gz"
          tar -czf "$TARBALL" -C dist/wheels .
          sha256sum "$TARBALL" > "${TARBALL}.sha256"
          # JTN-697: Per-wheel sha256 manifest so install.sh can detect a
          # truncated/corrupt individual wheel inside an otherwise-valid
          # tarball (e.g. 0-byte numpy-*.whl). Format: one `sha256sum` line
          # per wheel with basenames only, so verification can `cd` into the
          # extracted wheelhouse dir and run `sha256sum -c` directly.
          ( cd dist/wheels && sha256sum *.whl ) > "${TARBALL}.manifest.sha256"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          ls -la "$TARBALL" "${TARBALL}.sha256" "${TARBALL}.manifest.sha256"

      - name: Attach wheelhouse to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.tarball }}.sha256
            ${{ steps.package.outputs.tarball }}.manifest.sha256
          fail_on_unmatched_files: true
