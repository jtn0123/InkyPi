name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 3 * * 0'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: install/requirements-dev.txt
      - name: Install dev dependencies
        run: |
          python -m pip install -U pip wheel
          pip install -r install/requirements-dev.txt
      - name: Lint and type-check
        env:
          CI: true
        run: scripts/lint.sh
      - name: Check dependency licenses
        run: |
          pip install --quiet pip-licenses
          # Block GPL-3/AGPL-3 specifically (not LGPL or GPL-2). Partial-match
          # is intentionally OFF to avoid catching LGPL or GPL-2-or-later.
          # Known GPL-3 exemptions tracked separately for replacement.
          # Do NOT add more — see JTN-298 follow-up.
          pip-licenses \
            --fail-on='GPL-3.0;AGPL-3.0;GPL-3.0-or-later;AGPL-3.0-or-later;GPL v3;AGPL v3;GPL-3.0-only;AGPL-3.0-only' \
            --format=plain \
            --ignore-packages recurring-ical-events
      - name: Restore benchmark baseline cache
        id: bench-cache
        uses: actions/cache@v4
        with:
          path: /tmp/bench-baseline.json
          key: benchmark-baseline-${{ runner.os }}-py3.12
      - name: Run perf benchmarks
        env:
          SKIP_BROWSER: '1'
          BENCHMARK_THRESHOLD_PCT: ${{ vars.BENCHMARK_THRESHOLD_PCT || '15' }}
          PERF_PLUGIN_RENDER_BUDGET_MS: ${{ vars.PERF_PLUGIN_RENDER_BUDGET_MS || '2000' }}
          PERF_COLD_START_BUDGET_S: ${{ vars.PERF_COLD_START_BUDGET_S || '3' }}
          PERF_COLD_START_SAMPLES: ${{ vars.PERF_COLD_START_SAMPLES || '3' }}
          PERF_COLD_START_TIMEOUT_S: ${{ vars.PERF_COLD_START_TIMEOUT_S || '90' }}
        run: |
          python -m pytest tests/benchmarks/ --benchmark-only \
            --benchmark-columns=min,mean,median,stddev,ops \
            --benchmark-json=/tmp/bench-current.json -q
          # Compare against CI-cached baseline if available, otherwise
          # fall back to the repo-committed baseline.
          if [ -f /tmp/bench-baseline.json ]; then
            python scripts/benchmark_compare.py \
              --baseline /tmp/bench-baseline.json \
              --current /tmp/bench-current.json
          else
            echo "No CI baseline cache found — recording initial baseline."
            echo "Comparing against repo baseline (cross-platform, informational only):"
            python scripts/benchmark_compare.py \
              --baseline tests/benchmarks/baseline.json \
              --current /tmp/bench-current.json || true
          fi
          # JTN-738: hard performance budgets on plugin render latency and
          # cold-start startup time.
          python scripts/perf_budget_gate.py --bench-json /tmp/bench-current.json
          # On main branch pushes, update the cached baseline for future PRs
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            cp /tmp/bench-current.json /tmp/bench-baseline.json
          fi

  shellcheck:
    name: Shell script validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Bash syntax check
        run: |
          # Validate bash syntax for all shell scripts
          bash -n install/install.sh
          bash -n install/update.sh
          bash -n install/uninstall.sh
          bash -n install/inkypi
          bash -n scripts/dev.sh
          bash -n scripts/dev_update.sh
          bash -n scripts/format.sh
          bash -n scripts/lint.sh
          bash -n scripts/preflash_validate.sh
          bash -n scripts/test.sh
          bash -n scripts/test_profile.sh
          bash -n scripts/venv.sh
          bash -n scripts/web_only.sh
          bash -n scripts/check_licenses.sh
          bash -n scripts/precommit_browser_warning.sh
          bash -n scripts/sim_install.sh
          bash -n scripts/test_install_memcap.sh
          bash -n scripts/ci_install_matrix_verify.sh
          bash -n scripts/check_requirements_drift.sh
      - name: Run shellcheck
        run: |
          # Run shellcheck linting on all shell scripts
          shellcheck install/*.sh scripts/*.sh install/inkypi

  lockfile-drift:
    name: Lockfile drift check
    runs-on: ubuntu-latest
    # JTN-616: migrated to `uv lock` + `uv export` for a universal cross-platform
    # lockfile. This now blocks merge because the runtime lockfile is part of
    # the release contract and is regenerated from uv.lock.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Check requirements drift
        run: bash scripts/check_requirements_drift.sh

  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.12', '3.13' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            install/requirements.txt
            install/requirements-dev.txt
      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenjp2-7 \
            libopenblas-dev \
            libfreetype6-dev \
            fonts-noto-color-emoji
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r install/requirements.txt -r install/requirements-dev.txt
          pip check
      - name: Build CSS
        run: python scripts/build_css.py
      - name: Run tests
        env:
          INKYPI_ENV: dev
          INKYPI_NO_REFRESH: '1'
          PYTHONPATH: src
        run: |
          # Keep CI serial while the local pytest-xdist path soaks.
          # Note: tests/snapshots/ are collected here but skip automatically
          # because REQUIRE_BROWSER_SMOKE is not set (they need Playwright
          # Chromium which isn't installed in this job). The browser-smoke
          # job runs them with a real browser.
          pytest --cov --cov-report=xml -q
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error

  sonarcloud:
    name: SonarCloud Scan
    needs: [tests]
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-3.12
        continue-on-error: true
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  smoke:
    name: Install smoke (container)
    needs: tests
    runs-on: ubuntu-latest
    container: debian:bookworm
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install OS dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            python3 python3-venv python3-pip git curl \
            libopenjp2-7 libopenblas-dev libfreetype6-dev \
            fonts-noto-color-emoji
      - name: Setup virtualenv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip wheel
      - name: Install Python dependencies
        run: |
          . .venv/bin/activate
          pip install -r install/requirements.txt
          pip check
      - name: Import smoke
        run: |
          . .venv/bin/activate
          python - <<'PY'
          import flask, PIL, requests, urllib3, numpy, icalendar, psutil, waitress
          import zoneinfo, feedparser
          print("Imports OK")
          PY
      - name: Boot web-only and probe routes
        env:
          INKYPI_ENV: dev
          INKYPI_NO_REFRESH: '1'
          PYTHONPATH: src
        run: |
          . .venv/bin/activate
          python src/inkypi.py --dev --web-only &
          SERVER_PID=$!

          # Wait for server to start and determine the correct URL
          SERVER_URL=""
          for i in $(seq 1 30); do
            # Try localhost first (most common case)
            if curl -fsS --max-time 2 http://127.0.0.1:8080/ >/dev/null 2>&1; then
              SERVER_URL="http://127.0.0.1:8080"
              break
            fi
            # Try common container IPs
            for ip in 172.18.0.2 172.17.0.2; do
              if curl -fsS --max-time 2 http://${ip}:8080/ >/dev/null 2>&1; then
                SERVER_URL="http://${ip}:8080"
                break 2
              fi
            done
            sleep 1
          done

          if [ -z "$SERVER_URL" ]; then
            echo "Server did not start within 30 seconds" >&2
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          echo "Using server URL: $SERVER_URL"

          # Test all routes — use a cookie jar so CSRF session is preserved
          COOKIES=$(mktemp)
          curl -fsS -c "$COOKIES" ${SERVER_URL}/ -o /tmp/home.html
          CSRF_TOKEN=$(sed -n 's/.*csrf-token.*content="\([^"]*\)".*/\1/p' /tmp/home.html | head -1)
          curl -fsS -b "$COOKIES" ${SERVER_URL}/settings >/dev/null
          curl -fsS -b "$COOKIES" ${SERVER_URL}/playlist >/dev/null
          curl -sS -b "$COOKIES" -o /dev/null -w '%{http_code}\n' ${SERVER_URL}/preview | tee preview_code.txt
          grep -q '^200$' preview_code.txt || { echo "Preview route did not return 200" >&2; kill $SERVER_PID 2>/dev/null || true; exit 1; }
          curl -fsS -b "$COOKIES" ${SERVER_URL}/plugin/clock >/dev/null
          curl -fsS -b "$COOKIES" ${SERVER_URL}/images/clock/faces/digital.png >/dev/null
          curl -fsS -b "$COOKIES" "${SERVER_URL}/download-logs?hours=2" >/dev/null
          curl -fsS -b "$COOKIES" "${SERVER_URL}/api/logs?hours=2&limit=200" >/dev/null
          curl -fsS -b "$COOKIES" -X POST -H "X-CSRFToken: $CSRF_TOKEN" -d 'plugin_id=clock' ${SERVER_URL}/save_plugin_settings >/dev/null
          curl -fsS -b "$COOKIES" -X POST -H "X-CSRFToken: $CSRF_TOKEN" -d 'plugin_id=clock' ${SERVER_URL}/update_now >/dev/null
          rm -f "$COOKIES"
          if [ ! -f src/static/images/processed_image.png ] && [ ! -f runtime/mock_display_output/latest.png ]; then
            echo "Expected preview image not found" >&2
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          curl -fsS ${SERVER_URL}/preview >/dev/null

          # Cleanup
          kill $SERVER_PID 2>/dev/null || true

  smoke-matrix:
    name: Runtime smoke matrix (${{ matrix.mode }})
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        mode: [web-only, dev-refresh]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            install/requirements.txt
            install/requirements-dev.txt
      - name: Install deps
        run: |
          python -m pip install -U pip wheel
          pip install -r install/requirements.txt -r install/requirements-dev.txt
      - name: Launch and probe
        env:
          INKYPI_ENV: dev
          INKYPI_NO_REFRESH: ${{ matrix.mode == 'web-only' && '1' || '0' }}
          PYTHONPATH: src
        run: |
          if [ "${{ matrix.mode }}" = "web-only" ]; then
            python src/inkypi.py --dev --web-only &
          else
            python src/inkypi.py --dev &
          fi
          PID=$!
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8080/healthz >/dev/null
          curl -fsS http://127.0.0.1:8080/readyz >/dev/null || true
          curl -fsS http://127.0.0.1:8080/settings >/dev/null
          curl -fsS http://127.0.0.1:8080/playlist >/dev/null
          curl -fsS http://127.0.0.1:8080/plugin/clock >/dev/null
          curl -fsS http://127.0.0.1:8080/api/health/system >/dev/null
          curl -fsS http://127.0.0.1:8080/api/health/plugins >/dev/null
          curl -fsS http://127.0.0.1:8080/api/benchmarks/summary >/dev/null
          # POST with CSRF token
          COOKIES=$(mktemp)
          curl -fsS -c "$COOKIES" http://127.0.0.1:8080/ -o /tmp/home.html
          CSRF_TOKEN=$(sed -n 's/.*csrf-token.*content="\([^"]*\)".*/\1/p' /tmp/home.html | head -1)
          curl -fsS -b "$COOKIES" -X POST -H "X-CSRFToken: $CSRF_TOKEN" -d 'plugin_id=clock' http://127.0.0.1:8080/save_plugin_settings >/dev/null
          rm -f "$COOKIES"
          kill $PID 2>/dev/null || true

  preflash-validate:
    name: Pre-flash validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            install/requirements.txt
            install/requirements-dev.txt
      - name: Install OS dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenjp2-7 \
            libopenblas-dev \
            libfreetype6-dev \
            fonts-noto-color-emoji
      - name: Setup clean virtualenv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip wheel
          pip install -r install/requirements.txt -r install/requirements-dev.txt
          pip check
      - name: Install Playwright Chromium
        if: runner.os == 'Linux'
        run: |
          . .venv/bin/activate
          python -m playwright install --with-deps chromium
      - name: Run pre-flash validation
        env:
          INKYPI_VALIDATE_INSTALL: '1'
          INKYPI_VALIDATE_PI_RUNTIME: '1'
          INKYPI_VALIDATE_STRESS: '1'
          INKYPI_VALIDATE_HEAVY_PLUGINS: '1'
          INKYPI_VALIDATE_BENCH_THRESHOLDS: '1'
          INKYPI_VALIDATE_COLD_BOOT: '1'
          INKYPI_VALIDATE_CACHE: '1'
          INKYPI_VALIDATE_ISOLATION: '1'
          INKYPI_VALIDATE_BROWSER_RENDER: '1'
          INKYPI_VALIDATE_INSTALL_IDEMPOTENCY: '1'
          INKYPI_VALIDATE_FAULTS: '1'
          INKYPI_VALIDATE_UPGRADE_COMPAT: '1'
          INKYPI_VALIDATE_FS_PERMS: '1'
          INKYPI_VALIDATE_RECOVERY: '1'
          INKYPI_VALIDATE_API_CONTRACT: '1'
        run: |
          scripts/preflash_validate.sh

  coverage-gate:
    name: Coverage gate
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            install/requirements.txt
            install/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install -U pip wheel
          pip install -r install/requirements.txt -r install/requirements-dev.txt
      - name: Create venv for preflash script
        run: |
          python -m venv .venv
          .venv/bin/pip install -r install/requirements.txt -r install/requirements-dev.txt
      - name: Run coverage validation
        env:
          INKYPI_VALIDATE_COVERAGE: '1'
        run: |
          scripts/preflash_validate.sh
      - name: Upload coverage gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-gate
          path: coverage.xml
          if-no-files-found: error

  security:
    name: Security and SBOM
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            install/requirements.txt
            install/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install -U pip wheel
          pip install -r install/requirements.txt -r install/requirements-dev.txt
      - name: Run pip-audit against hashed lockfiles
        run: |
          mkdir -p artifacts/security
          python -m pip_audit -r install/requirements.txt --format=json \
            --output artifacts/security/pip-audit-runtime.json
          python -m pip_audit -r install/requirements-dev.txt --format=json \
            --output artifacts/security/pip-audit-dev.json
      - name: Generate SBOM
        run: |
          python_path="$(python -c 'import sys; print(sys.executable)')"
          python -m cyclonedx_py environment "$python_path" --of JSON \
            -o artifacts/security/sbom.json
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: artifacts/security
          if-no-files-found: error

  flake-detection:
    name: Flake detection
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            install/requirements.txt
            install/requirements-dev.txt
      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenjp2-7 \
            libopenblas-dev \
            libfreetype6-dev \
            fonts-noto-color-emoji
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r install/requirements.txt -r install/requirements-dev.txt
      - name: Create venv for preflash script
        run: |
          python -m venv .venv
          .venv/bin/pip install -r install/requirements.txt -r install/requirements-dev.txt
      - name: Install Playwright Chromium
        run: |
          .venv/bin/python -m playwright install --with-deps chromium
      - name: Build CSS
        run: python scripts/build_css.py
      - name: Run flake detection
        env:
          INKYPI_VALIDATE_FLAKE: '1'
        run: |
          scripts/preflash_validate.sh

  soak-nightly:
    name: Soak nightly
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            install/requirements.txt
            install/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install -U pip wheel
          pip install -r install/requirements.txt -r install/requirements-dev.txt
      - name: Run soak validation
        env:
          INKYPI_VALIDATE_SOAK: '1'
        run: |
          scripts/preflash_validate.sh

  mutation-nightly:
    name: Mutation nightly
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            install/requirements.txt
            install/requirements-dev.txt
      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenjp2-7 \
            libopenblas-dev \
            libfreetype6-dev \
            fonts-noto-color-emoji
      - name: Install dependencies
        run: |
          python -m pip install -U pip wheel
          pip install -r install/requirements.txt -r install/requirements-dev.txt
      - name: Run mutmut
        env:
          INKYPI_ENV: dev
          INKYPI_NO_REFRESH: '1'
          PYTHONPATH: src
        run: |
          mutmut run --CI
      - name: Show mutation results
        if: always()
        run: |
          mutmut results || true
      - name: Upload mutmut cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-cache
          path: .mutmut-cache
          if-no-files-found: ignore

  browser-smoke:
    name: Browser smoke (tabs + plugins)
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            install/requirements.txt
            install/requirements-dev.txt
      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenjp2-7 \
            libopenblas-dev \
            libfreetype6-dev \
            fonts-noto-color-emoji
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r install/requirements.txt -r install/requirements-dev.txt
      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium
      - name: Build CSS
        run: python scripts/build_css.py
      - name: Run browser smoke suite
        env:
          BROWSER_SMOKE_ARTIFACT_DIR: runtime/mock_display_output/browser_smoke_failures
          INKYPI_ENV: dev
          INKYPI_NO_REFRESH: '1'
          PYTHONPATH: src
          REQUIRE_BROWSER_SMOKE: '1'
        run: |
          # tests/snapshots/ also runs here because plugin golden-file tests
          # need Playwright Chromium to render real HTML (not the blank fallback).
          # tests/integration/test_visual_regression.py (JTN-700) runs here
          # too because page-layout baselines are gated on the same browser
          # env and share the ubuntu-24.04 font fallback.
          pytest \
            tests/integration/test_browser_smoke.py \
            tests/integration/test_visual_regression.py \
            tests/snapshots/ \
            -q
      - name: Upload browser smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-failures
          path: runtime/mock_display_output/browser_smoke_failures
          if-no-files-found: ignore
      - name: Upload snapshot failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-failures
          path: tests/snapshots/actual/
          if-no-files-found: ignore
      - name: Upload layout snapshot failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: layout-snapshot-failures
          path: tests/snapshots/layout/actual/
          if-no-files-found: ignore

  install-matrix:
    # Keep the required install matrix in a reusable workflow so ci.yml and any
    # manual reruns share one implementation instead of drifting apart.
    name: Install matrix
    uses: ./.github/workflows/install-matrix.yml

  install-smoke-memcap:
    name: Install smoke (512 MB memory cap)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run 512 MB memory-cap smoke test
        run: |
          ./scripts/test_install_memcap.sh trixie

      - name: Upload container logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-smoke-memcap-logs
          path: /tmp/inkypi-smoke-logs
          if-no-files-found: ignore

  install-crash-loop-gate:
    name: Install crash-loop regression gate
    # JTN-614: runs the JTN-609 Docker-based regression gate that verifies
    # JTN-600 (systemctl disable during install) and JTN-607 (install-in-progress
    # lockfile) both prevent a mid-install crash from spawning a restart loop
    # that would OOM a Pi Zero 2 W. The test auto-skips without Docker, so we
    # set REQUIRE_INSTALL_CRASH_LOOP_TEST=1 to force it on CI.
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            install/requirements.txt
            install/requirements-dev.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r install/requirements.txt -r install/requirements-dev.txt
      - name: Run install crash-loop regression gate
        env:
          REQUIRE_INSTALL_CRASH_LOOP_TEST: '1'
          PYTHONPATH: src
        run: |
          pytest tests/integration/test_install_crash_loop.py -v

  ci-gate:
    name: CI gate (all checks pass)
    needs: [lint, shellcheck, lockfile-drift, tests, sonarcloud, smoke, smoke-matrix, coverage-gate, security, browser-smoke, install-smoke-memcap, install-matrix, install-crash-loop-gate]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          # Fail this job (and therefore the gate) if any required job did not succeed.
          # 'sonarcloud' is advisory (secrets may be absent on forks), so we only
          # require it to not be in an explicit failure state — cancelled/skipped is OK.
          results='${{ toJSON(needs) }}'
          echo "$results"

          # Jobs that must be 'success'
          for job in lint shellcheck lockfile-drift tests smoke smoke-matrix coverage-gate security browser-smoke install-smoke-memcap install-matrix install-crash-loop-gate; do
            result=$(echo "$results" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('$job',{}).get('result','missing'))")
            if [ "$result" != "success" ]; then
              echo "Required job '$job' did not succeed (result: $result)"
              exit 1
            fi
          done

          # sonarcloud: advisory — warn on failure but do not block
          sonar_result=$(echo "$results" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sonarcloud',{}).get('result','missing'))")
          if [ "$sonar_result" = "failure" ]; then
            echo "WARNING: sonarcloud reported failure — investigate but not blocking gate"
          fi

          echo "All required CI checks passed."
