name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository == 'jtn0123/InkyPi'
    outputs:
      released: ${{ steps.resolve_tag.outputs.released }}
      tag: ${{ steps.resolve_tag.outputs.tag }}
    concurrency:
      group: release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: install/requirements.txt

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install semantic-release and SBOM tools
        run: pip install python-semantic-release==9.21.1 cyclonedx-bom

      - name: Semantic Release — version & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semantic-release version
          semantic-release publish

      - name: Resolve released tag
        id: resolve_tag
        run: |
          TAG=$(
            git tag --points-at HEAD \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$' \
            | sort -V \
            | tail -n1 \
            || true
          )
          if [ -n "${TAG}" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "Release tag: ${TAG}"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "No new release tag on this run."
          fi

      - name: Warn loudly if no release was cut
        if: steps.resolve_tag.outputs.released != 'true'
        run: |
          # python-semantic-release exits 0 when a merged commit doesn't match
          # a bumpable conventional-commit type (feat/fix/perf or BREAKING
          # CHANGE). A silent green here hid 5 unreleased PRs in a row. Emit
          # a prominent annotation so future misses are visible on the commit
          # status page and in the Actions summary.
          SUBJECT=$(git log -1 --pretty=%s)
          {
            echo "## No release cut"
            echo ""
            echo "\`semantic-release version\` found no bumpable commits since"
            echo "the last tag. Most recent commit subject:"
            echo ""
            echo "    ${SUBJECT}"
            echo ""
            echo "If this merge included user-facing changes, the PR title"
            echo "probably didn't use a conventional-commits type that triggers"
            echo "a bump (\`feat:\`, \`fix:\`, \`perf:\`, or a \`BREAKING CHANGE:\`"
            echo "footer). See CONTRIBUTING.md."
          } >> "$GITHUB_STEP_SUMMARY"
          # GitHub workflow commands require %, CR, and LF in message bodies
          # to be URL-encoded, otherwise subjects like "bump coverage to 90%"
          # render garbled in the annotation.
          ESCAPED=${SUBJECT//%/%25}
          ESCAPED=${ESCAPED//$'\r'/%0D}
          ESCAPED=${ESCAPED//$'\n'/%0A}
          echo "::warning title=No release cut::semantic-release skipped this commit; subject: ${ESCAPED}"
          # Non-failing on purpose — docs/chore/refactor PRs legitimately skip
          # release, so we only surface the info rather than red-crossing the run.

      - name: Strip build-only files from GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # semantic-release needs VERSION and uv.lock listed as `assets` so
          # they get committed alongside the version bump, but the same config
          # also uploads them as GitHub release downloads. Users don't install
          # those files directly — they live in the repo — so drop them from
          # the release listing to keep it uncluttered.
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          if [ -z "${TAG}" ]; then
            echo "No new release tag on this run, skipping asset cleanup"
            exit 0
          fi
          for asset in VERSION uv.lock; do
            if gh release view "${TAG}" --repo "${{ github.repository }}" --json assets \
                 --jq '.assets[].name' | grep -Fxq "${asset}"; then
              gh release delete-asset "${TAG}" "${asset}" \
                --repo "${{ github.repository }}" --yes
              echo "Removed ${asset} from release ${TAG}"
            fi
          done

      - name: Generate SBOM
        run: |
          pip install -r install/requirements.txt
          python -m venv .venv
          .venv/bin/pip install -r install/requirements.txt
          mkdir -p artifacts/security
          python -m cyclonedx_py environment .venv/bin/python --of JSON \
            -o artifacts/security/sbom.json

      - name: Attach SBOM to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          if [ -z "${TAG}" ]; then
            echo "No new release tag on this run, skipping SBOM upload"
            exit 0
          fi

          SBOM_FILE="inkypi-${TAG}-bom.json"
          cp artifacts/security/sbom.json "${SBOM_FILE}"
          # Only upload when semantic-release created the tag in this run and the
          # matching GitHub release exists.
          if gh release view "${TAG}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            gh release upload "${TAG}" "${SBOM_FILE}" \
              --repo "${{ github.repository }}" \
              --clobber
            echo "Uploaded ${SBOM_FILE} to release ${TAG}"
          else
            echo "No release found for ${TAG}, skipping SBOM upload"
          fi

  wheelhouse:
    name: Build wheelhouse release assets
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/build-wheelhouse.yml
    with:
      tag: ${{ needs.release.outputs.tag }}

  pi-image:
    name: Build pre-installed Pi image
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/build-pi-image.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
