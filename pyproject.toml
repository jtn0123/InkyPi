[tool.black]
line-length = 88
target-version = ["py311"]
extend-exclude = """
(
  mock_display_output
)
"""

[tool.ruff]
line-length = 88
target-version = "py311"
src = ["src", "tests", "scripts"]
exclude = [
  ".git",
  ".venv",
  "venv",
  "build",
  "dist",
  "mock_display_output",
  "src/display/waveshare_epd"
]

[tool.ruff.lint]
select = [
  "E",      # pycodestyle
  "F",      # pyflakes
  "I",      # isort (imports)
  "UP",     # pyupgrade
  "B",      # flake8-bugbear
  "SIM",    # flake8-simplify
  "C4",     # flake8-comprehensions
  "PERF",   # perflint
]
ignore = [
  "E501",   # line length handled by Black
  "B011",   # assert False (used as sentinel in tests)
  "B017",   # pytest.raises(Exception) is acceptable
  "SIM105", # contextlib.suppress — noisy, debatable
  "SIM117", # multiple with statements — stylistic
]

[tool.ruff.lint.isort]
combine-as-imports = true
known-first-party = ["src"]

[tool.mutmut]
paths_to_mutate = "src/utils/http_utils.py,src/utils/image_serving.py,src/refresh_task/task.py"
tests_dir = "tests/"
runner = "python -m pytest tests/ -x --tb=no -q"
dict_synonyms = ""

[tool.semantic_release]
version_toml = ["pyproject.toml:tool.semantic_release.version"]
version = "0.19.0"
branch = "main"
tag_format = "v{version}"
upload_to_pypi = false
build_command = "echo '{version}' > VERSION"
