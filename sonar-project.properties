sonar.projectKey=jtn0123_InkyPi
sonar.organization=jtn0123ismysonar

sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=**/test_*.py,**/tests/**
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/venv/**,**/node_modules/**,**/build/**,**/waveshare_epd/**

# Python coverage (generated by pytest --cov)
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=src/static/scripts/**,src/static/sw.js

sonar.python.version=3.11,3.12,3.13

# Fail CI when quality gate is not met (e.g. new issues introduced)
sonar.qualitygate.wait=true
